<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Flag Perfume - Coming Soon</title>
    <style>
        /* Margin clear karne ke liye aur height set karne ke liye */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Pure background ko cover karne ke liye perfect CSS */
        .bg-container {
            background-image: url('coming-soon.png');
            height: 100vh; /* Viewport height 100% */
            width: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover; /* Yeh image ko stretch hone se rokta hai aur center rakhta hai */
            position: relative;
        }

        /* Background par halka sa dark overlay taaki text ekdam saaf padha jaye */
        .overlay {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* 0.5 ko kam ya zyada kar sakte hain dark/light karne ke liye */
        }

        /* Content ko bilkul center mein alignment dena */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            width: 90%;
            max-width: 600px; /* Mobile par content screen se bahar na jaye */
            padding: 20px;
            z-index: 2; /* Overlay ke upar dikhane ke liye */
        }

        .brand-name {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1.3rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .call-text {
            font-size: 1.1rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* Clickable phone number jo continuous bounce/pulse karega */
        .phone-number {
            display: inline-block;
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); /* Premium glass look */
            animation: pulseAnimation 2s infinite;
        }

        .phone-number:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* Animation loop */
        @keyframes pulseAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Mobile phones ke liye settings automatic thodi choti ho jayengi */
        @media (max-width: 480px) {
            .brand-name { font-size: 2rem; }
            .tagline { font-size: 1rem; }
            .phone-number { font-size: 1.5rem; padding: 10px 25px; }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="overlay"></div>
        <div class="content">
            <div class="brand-name">Green Flag Perfume</div>
            <div class="tagline">Something Luxury Is Coming Soon...</div>
            
            <div class="call-text">For Inquiry & Pre-Orders:</div>
            <a href="tel:+918750685516" class="phone-number">+91 87506 85516</a>
        </div>
    </div>

</body>
</html>
