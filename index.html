<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Flag Perfume - Coming Soon</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            /* Overflow hidden hata diya hai taaki agar image badi ho toh scroll ho sake */
            background-color: #000; /* Agar screen badi ho toh side mein khali jagah black dikhegi */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Image Wrapper jo image ko full width dega aur height auto rakhega */
        .bg-container {
            position: relative;
            width: 100%;
            display: inline-block;
        }

        /* Yeh rule ensure karega ki image 100% poori dikhe aur kabhi cut na ho */
        .bg-image {
            width: 100%;
            height: 800px;
            display: block;
			position:relative;
        }

        /* Background par halka sa dark overlay taaki white text achhe se chamke */
        .overlay {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); 
        }

        /* Content hamesha image ke bilkul center mein rahega, chahe scroll ho */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            width: 90%;
            max-width: 600px;
            z-index: 2;
        }

        .brand-name {
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        .tagline {
            font-size: 1.5rem;
            margin-bottom: 40px;
            opacity: 0.9;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
        }

        .call-text {
            font-size: 1.1rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
        }

        /* Clickable phone number with premium blur look */
        .phone-number {
            display: inline-block;
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.5); /* Background thoda dark kiya taaki number clear dikhe */
            backdrop-filter: blur(5px);
            animation: pulseAnimation 2s infinite;
        }

        .phone-number:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* Animation */
        @keyframes pulseAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Mobile Responsive Settings */
        @media (max-width: 768px) {
            .brand-name { font-size: 2.2rem; }
            .tagline { font-size: 1.1rem; margin-bottom: 20px; }
            .phone-number { font-size: 1.4rem; padding: 10px 25px; }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <img src="coming-soon.jpeg" alt="Coming Soon" class="bg-image">
        <div class="overlay"></div>
        
        <div class="content">
            <div class="brand-name">Green Flag Perfume</div>
            <div class="tagline">Something Luxury Is Coming Soon...</div>
            
            <div class="call-text">For Inquiry & Pre-Orders:</div>
            <a href="tel:+918750685516" class="phone-number">+91 87506 85516</a>
        </div>
    </div>

</body>
</html>
